<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Petra Christian University — partnership portfolio (MoU / MoA / IA) across domestic and international institutions." />
  <title>Petra Partnership Dashboard</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#eef4ff',
              100: '#dbe6ff',
              200: '#bdd0ff',
              300: '#90b0ff',
              400: '#5e84ff',
              500: '#3a5fff',
              600: '#243ff5',
              700: '#1d31d6',
              800: '#1c2bab',
              900: '#1d2a86',
            },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 font-sans antialiased">

  <!-- App Shell -->
  <div id="app" class="min-h-screen flex flex-col"></div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-2 max-w-sm"></div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <script src="js/main.js"></script>
</body>
</html>
